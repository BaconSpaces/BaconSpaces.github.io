<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@Bacon_Space Projects</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

    </style>
</head>
<body>
<div class="page">

    <!-- Avatar -->
    <div class="avatar-ring" id="avatarRing">
        <div class="avatar-fallback">
            <i class="fa-solid fa-user"></i>
        </div>
    </div>

    <!-- Header -->
    <h1 class="handle"><span>@</span>Bacon_Space</h1>
    <p class="tagline">Projects &amp; Tools</p>

    <!-- Divider -->
    <div class="divider"><div class="divider-dot"></div></div>

    <!-- Links — only 2, so centred in last-row wrapper -->
    <div class="grid">
        <div class="grid-last-row">
        <a href="https://tfst.github.io/" class="card">
            <div class="card-icon">
                <img class="icon-img" src="https://r2.fivemanage.com/image/VcXnxsNTOXwj.png" alt="">
            </div>
            <span class="card-label">TeamFST</span>
        </a>
        <a href="https://baconspaces.github.io/BodyCam/" class="card">
            <div class="card-icon"><i class="fa-solid fa-camera"></i></div>
            <span class="card-label">BodyCam</span>
        </a>
            
       <a href="https://tinyurl.com/KickStats" class="card">
            <div class="card-icon">
                <img class="icon-img" src="https://r2.fivemanage.com/image/GG4uI0wuIqNL.png" alt="">
            </div>
            <span class="card-label">KickStats</span>
        </a>

        </div>
    </div>

    <p class="footer">© <span id="year"></span> Bacon_Space</p>

</div>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // GitHub avatar
    fetch('https://api.github.com/users/BaconSpaces')
        .then(r => { if (!r.ok) throw 0; return r.json(); })
        .then(data => {
            const ring = document.getElementById('avatarRing');
            const img = document.createElement('img');
            img.src = data.avatar_url;
            img.alt = '@Bacon_Space avatar';
            img.loading = 'lazy';
            ring.innerHTML = '';
            ring.appendChild(img);
        })
        .catch(() => {});
</script>
</body>
</html>
